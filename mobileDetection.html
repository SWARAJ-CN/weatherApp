<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Umbrella | WeatherApp</title>
    <link rel="shortcut icon" href="./assets/cloud.png" type="image/x-icon">
    <style>
        :root {
            --bg-gradient: radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                           radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                           radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%),
                           #0b0d19;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --accent-glow: rgba(99, 102, 241, 0.15);
            --btn-bg: #6366f1;
            --btn-hover: #4f46e5;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-primary);
            padding: 24px;
            overflow: hidden;
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
            padding: 48px 32px;
            text-align: center;
            max-width: 420px;
            width: 100%;
            animation: scaleIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.96) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .icon-wrapper {
            position: relative;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 32px;
        }

        .icon-wrapper::before {
            content: '';
            position: absolute;
            width: 120px;
            height: 120px;
            background: var(--accent-glow);
            border-radius: 50%;
            filter: blur(20px);
            z-index: 0;
        }

        .icon {
            position: relative;
            z-index: 1;
            width: 88px;
            height: 88px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 22px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #818cf8;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }

        .icon svg {
            width: 44px;
            height: 44px;
        }

        .badge {
            display: inline-block;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #f87171;
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.03em;
            text-transform: uppercase;
            margin-bottom: 24px;
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 12px;
            color: #ffffff;
        }

        p {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 36px;
            font-weight: 400;
        }

        .btn {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 14px;
            background: var(--btn-bg);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: -0.01em;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
            transition: all 0.2s ease;
        }

        .btn:hover {
            background: var(--btn-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
        }

        .btn:active {
            transform: translateY(1px);
            box-shadow: 0 2px 6px rgba(99, 102, 241, 0.3);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon-wrapper">
            <div class="icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="3" width="20" height="14" rx="2" />
                    <line x1="8" y1="21" x2="16" y2="21" />
                    <line x1="12" y1="17" x2="12" y2="21" />
                </svg>
            </div>
        </div>

        <div>
            <span class="badge">Desktop Required</span>
        </div>
        
        <h1>Desktop Only Site</h1>
        
        <p>This platform is currently optimized exclusively for larger screens. Please switch to a laptop or desktop computer for the best possible experience.</p>
        
        <button class="btn" onclick="window.location.reload()">Check Screen Again</button>
    </div>

    <script>
        setInterval(() => {
            if (!navigator.onLine) {
                window.location.replace('./noInternet.html');
            }
        }, 500);
    </script>
</body>
</html>
