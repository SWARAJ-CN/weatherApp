<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desktop Only Access</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
            padding: 20px;
        }

        .container {
            background-color: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            padding: 40px 30px;
            text-align: center;
            max-width: 400px;
            width: 100%;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .icon-container {
            margin-bottom: 24px;
        }

        .icon {
            width: 80px;
            height: 80px;
            background-color: #ffebe6;
            border-radius: 50%;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            color: #ff5630;
        }

        .icon svg {
            width: 40px;
            height: 40px;
            fill: currentColor;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 12px;
            color: #172b4d;
            font-weight: 700;
        }

        p {
            font-size: 15px;
            color: #6b778c;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .badge {
            display: inline-block;
            background-color: #deebff;
            color: #0747a6;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .btn {
            display: inline-block;
            width: 100%;
            padding: 12px;
            background-color: #0052cc;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn:hover {
            background-color: #0065ff;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon-container">
            <div class="icon">
                <svg viewBox="0 0 24 24">
                    <path d="M4 6h16v10H4zm16-2H4c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-1 14H5v-1h14v1zm-5 2h-4v1h4v-1z"/>
                </svg>
            </div>
        </div>

        <span class="badge">Small screen Detected</span>
        
        <h1>Desktop Only Site</h1>
        
        <p>We're sorry, but this platform is currently optimized exclusively for desktop screens. Please switch to a laptop or desktop computer for the best experience.</p>
        
        <button class="btn" onclick="window.location.replace('./index.html')">ReCheck</button>
    </div>
</body>
</html>
