<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Umbrella | WeatherApp</title>
    <link rel="shortcut icon" href="./assets/cloud.png" type="image/x-icon">
    <link rel="stylesheet" href="./style.css">
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous"
        referrerpolicy="no-referrer"
    />
    <script
        src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/js/all.min.js"
        integrity="sha512-0X0pG62hJNN3vP6fQtbDNRsTA70vsK1tnE+bBZ5qTqL0U8nyJlcQFV3ayhtq/Y5cHIzoHmr18bODsPwhj/KgkQ=="
        crossorigin="anonymous"
        referrerpolicy="no-referrer"
    ></script>
</head>
<body>
    <div class="main">
        <div class="top-section">
            <div class="top-text">
                <p class="app-name"> <i class="fa-solid fa-umbrella"></i> UMBRELLA</p>
               <span style="display: flex; gap:15px;">
                    <p class="date-string" id="cal">.....</p> 
                    <p class="date-string" id="time">....</p>
               </span>
            </div>
            <div class="name-full" id="search-result"><i class="fa-classic fa-solid fa-location-crosshairs" style="color:  gray;"></i> <p id="full-name" style="text-overflow: ellipsis;"> &nbsp; No location found</p></div>
            <div class="search-section">
                <i class="fa-classic fa-solid fa-magnifying-glass"></i>
                 <input type="text" placeholder="Search" class="search-box" id="search-box">
                 <button class="search" id="search">search</button>
            </div>
        </div>
        <div class="speration-div">
            <div class="left-side">
                <div class="image-container">   
                    <img src="./assets/default.png" alt="Weather background" id="hero-img">
                    <div class="image-hover-content">
                        <span class="weather-from"> 
                           <div class="weather-location" > <img src="./assets/usa.png" alt=""> <span  id="state"> Not Found</span> 
                        </div>
                            <div class="weather-country">
                                <img src="./assets/location.png" alt="">
                                <span id="place">Not Found</span> 
                            </div>
                           
                        </span>
                        <span class="weather-condition">
                            <i class="fa-solid fa-temperature-high"></i>
                           <span class="celsius" id="cel"> Not Found</span>
                            |
                            <img src="./assets/rain.png" alt="..icon" id="rainimg">
                            <span class="status" id="rain">Not Found</span>
                             |
                             <i class="fa-brands fa-hotjar"></i>
                            <span class="fah" id="fah">Not Found</span>
                            
                        </span>

                        <span class="wind-condition">
                            <span class="wind-speed">
                                <img src="./assets/wind.png" alt="..icon">
                                &nbsp;
                                <span class="ms" id="windspeed">Not Found</span>
                                &nbsp;
                                <span class="degree" id="wind-direction">Not Found</span>
                                &nbsp;
                                <img src="./assets/compass.png" alt="">
                                &nbsp;
                                <span id="compass">NEWS</span>
                            </span>
                            <span class="hpa-sts"> 
                                <img src="./assets/humidity.png" alt="..icon">
                                 &nbsp;
                                <span class="hpa" id="hpa">Not Found</span>
                            </span>
                        </span>
                       <span class="air"> 
                        <i class="fa-solid fa-lungs"></i> 
                        <p class="airquality">air qualit</p>
                    </span>
                    </div>
                    <div class="twilight ">
                        <script src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.9.14/dist/dotlottie-wc.js" type="module"></script>
                        <dotlottie-wc src="https://lottie.host/8f149d42-c92f-4d82-a2f2-f321f94b98d9/XG3DePltFU.lottie" id="night" autoplay loop ></dotlottie-wc>
                        <dotlottie-wc src="https://lottie.host/4e57bee8-634e-4b26-b9ee-795083610122/NO7YaEZeSX.lottie" autoplay loop id="day"></dotlottie-wc>
                    </div>
                     <span class="c-code" id="c-code">
                         ❌
                    </span>
                    <p class="cel" id="stroke">  
                    </p>
                    <span class="mood">
                    </span>
                </div>
                <!-- left side bottom portion -->
                 <span class="heading">TODAY</span>
                    <div class="today-card">
                       
                    </div>

                    <span class="heading">5 DAYS</span>
                    <div class="Fday-card">
                       
                    </div>
             </div>
             <!-- right side -->
             <div class="right-side">
                <!-- calender -->
                 <div class="calendar">
                        <div class="header">
                            <button id="prev">◀</button>
                            <h2 id="monthYear"></h2>
                            <button id="next">▶</button>
                        </div>

                        <div class="days">
                            <div>Sun</div>
                            <div>Mon</div>
                            <div>Tue</div>
                            <div>Wed</div>
                            <div>Thu</div>
                            <div>Fri</div>
                            <div>Sat</div>
                        </div>

                        <div id="dates" class="dates"></div>
                    </div>
                    <!-- cal end -->
                     <!-- map -->
                      <div class="map">
                        <iframe 
                               id="map"
                                width="100%"
                                height="400"
                                frameborder="0"
                                scrolling="no"
                                marginheight="0"
                                marginwidth="0"
                                src=""
                                >
                        </iframe>
                     </div>
             </div>
        </div>
    </div>
    <script type="module" src="./script.js"></script>
</body>
</html>
